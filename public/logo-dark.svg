<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="moonG" cx="35%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="50%"  stop-color="#D4E6FF"/>
      <stop offset="100%" stop-color="#8ABAED"/>
    </radialGradient>
    <filter id="moonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="crescentMask">
      <rect width="512" height="512" fill="white"/>
      <circle cx="232" cy="167" r="78" fill="black"/>
    </mask>
  </defs>

  <g filter="url(#moonGlow)">
    <circle cx="197" cy="197" r="90" fill="url(#moonG)" mask="url(#crescentMask)"/>
  </g>

  <text x="348" y="470" font-size="310" text-anchor="middle"
        font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji">☁️</text>
</svg>
